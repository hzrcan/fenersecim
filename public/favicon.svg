<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#001C54"/>
  
  <!-- Yellow accent circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#FFED00" stroke-width="8"/>
  
  <!-- Center circle with FB initials -->
